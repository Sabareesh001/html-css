<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-7</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="slider-toggle">
        <a href="#manual-slider"><button>Manual Slider</button></a>
        <a href="#auto-slider"><button>Auto Slider</button></a>
    </div>
    <div id="manual-slider" class="carousel">
        <input type="radio" name="slide" id="slide1" checked>
        <div class="slide">
            <img src="assets/img1.jpg" alt="Slide 1">
        </div>
        <input type="radio" name="slide" id="slide2">
        <div class="slide">
            <img src="assets/img2.jpg" alt="Slide 2">
        </div>
        <input type="radio" name="slide" id="slide3">
        <div class="slide">
            <img src="assets/img3.jpg" alt="Slide 3">
        </div>
    </div>
    <div id="auto-slider">
        <div class="auto-slide">
            <img src="assets/img1.jpg" alt="Slide 1">
        </div>
        <div class="auto-slide">
            <img src="assets/img2.jpg" alt="Slide 2">
        </div>
        <div class="auto-slide">
            <img src="assets/img3.jpg" alt="Slide 3">
        </div>
</body>

</html>
